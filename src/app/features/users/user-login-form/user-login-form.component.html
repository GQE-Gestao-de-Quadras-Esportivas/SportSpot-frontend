<div class="row w-100">
  <div class="col-sm-12 col-lg-5 bg-black justify-content-center align-content-center">
    <div class="d-flex flex-column align-items-center">
      <img class="mb-64" width="360px" src="images/logo-360x90.png" alt="" />

        <form class="flex flex-col text-center" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="custom-form-field">
            <mat-label>Email</mat-label>
            <input matInput placeholder="Digite seu email" [formControl]="loginForm.controls.email" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="custom-form-field">
            <mat-label>Senha</mat-label>
            <input matInput type="password" placeholder="Digite sua senha" [formControl]="loginForm.controls.password" />
          </mat-form-field>
          <button type="submit">Entrar</button>
          <p>
            Ainda não está cadastrado?
            <span class="span-link" (click)="goToRegister()">Registre-se</span>
          </p>
        </form>
    </div>
  </div>
  <div class="col-0 col-lg-7 h-auto logo-banner">
  </div>
</div>
