<header class="flex items-center justify-between px-10">
  <h4 class="brand self-center">SportSpot</h4>

  <div class="w-96">
    <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
    <input
      type="text"
      placeholder="Search facilities or bookings..."
      class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-full text-sm focus:outline-none focus:border-slate-400 text-slate-800 transition-colors"
    />
  </div>

  <div class="flex items-center gap-4">
    <div class="flex items-center gap-4">
      <a href="#" class="text-sm font-semibold text-slate-600 hover:text-slate-900">Support</a>
      <a href="#" class="text-sm font-semibold text-slate-600 hover:text-slate-900">Help Center</a>
    </div>

    <button
      class="bg-[#15803D] hover:bg-[#166534] text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-colors shadow-sm"
    >
      <i class="pi pi-plus"></i> New Booking
    </button>

    <div class="flex items-center text-slate-600 gap-4">
      <button class="hover:text-slate-900 relative p-1">
        <i class="pi pi-bell text-lg"></i>
        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
      </button>
      <button class="hover:text-slate-900 p-1"><i class="pi pi-cog text-lg"></i></button>
      <img
        src="https://avatar.iran.liara.run/public/30"
        alt="Avatar"
        class="w-9 h-9 rounded-full border border-slate-200 object-cover ml-1"
      />
    </div>
  </div>
</header>
